runtime: nodejs20
env: standard

instance_class: F1

automatic_scaling:
  max_instances: 1

  min_idle_instances: 0

  target_cpu_utilization: 0.65
  target_throughput_utilization: 0.65

env_variables:
  NODE_ENV: "production"

handlers:
  - url: /static
    static_dir: public
  - url: /.*
    script: auto
